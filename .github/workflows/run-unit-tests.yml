name: Unit tests
on:
  push:
  workflow_dispatch:

jobs:
  container_job:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
      fail-fast: true
    container: ubuntu:latest@sha256:b7f48194d4d8b763a478a621cdc81c27be222ba2206ca3ca6bc42b49685f3d9e
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          apt update
          apt install --no-install-recommends --yes bash curl git gpg ca-certificates # needed by codecov below
          uv sync --link-mode=copy --dev  # editable install so coverage can be generated

      - name: Run Unit tests
        run: uv run pytest --cov-report term-missing --cov-report=xml --cov=src tests

      - name: "Upload coverage to Codecov"
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
