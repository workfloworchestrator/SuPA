services:
  #
  # SuPA
  #
  supa:
    image: ghcr.io/workfloworchestrator/supa:latest@sha256:92675cf8d4c5200088df9ead970823dbfa0616501c5972affeac805354e1a1ee
    configs:
      - source: supa.env
        target: /usr/local/etc/supa/supa.env
    volumes:
      - .:/usr/local/var
    ports:
      - "4321:4321"
    depends_on:
      create-database-folder:
        condition: service_completed_successfully
      polynsi:
        condition: service_started
  #
  # PolyNSI
  #
  polynsi:
    image: ghcr.io/workfloworchestrator/polynsi:latest@sha256:a701cd3f6c39d8358cb270c9572998f5d71b8d98eaa849ca6e5eed8123aea1f5
    ports:
      - "8443:8443"
    configs:
      - source: application.properties
        target: /usr/local/polynsi/application.properties
      - source: polynsi-keystore.jks
        target: /usr/local/polynsi/polynsi-keystore.jks
      - source: polynsi-truststore.jks
        target: /usr/local/polynsi/polynsi-truststore.jks
    volumes:
      - ./tmp:/tmp:rw
  #
  # create SuPA database folder
  #
  create-database-folder:
    image: 'busybox:latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d'
    command: ["sh", "-c", "test -d /usr/local/var/db || mkdir /usr/local/var/db"]
    volumes:
      - .:/usr/local/var
configs:
  supa.env:
    file: ./supa.env
  application.properties:
    file: ./application.properties
  polynsi-keystore.jks:
    file: ./polynsi-keystore.jks
  polynsi-truststore.jks:
    file: ./polynsi-truststore.jks
