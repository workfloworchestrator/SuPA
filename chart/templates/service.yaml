apiVersion: v1
kind: Service
metadata:
  name: {{ include "SuPA.fullname" . }}
  labels:
    {{- include "SuPA.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http-alt
      protocol: TCP
      name: http
  selector:
    {{- include "SuPA.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-grpc" (include "SuPA.fullname" .) }}
  labels:
    {{- include "SuPA.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpc }}
      targetPort: 50051
      protocol: TCP
      name: grpc
  selector:
    {{- include "SuPA.selectorLabels" . | nindent 4 }}
{{- if .Values.mcp.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-mcp" (include "SuPA.fullname" .) }}
  labels:
    {{- include "SuPA.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.mcp.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "SuPA.selectorLabels" . | nindent 4 }}
{{- end }}
